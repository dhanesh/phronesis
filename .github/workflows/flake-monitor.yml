# Satisfies: RT-9 — weekly flake-rate computation (O6 countermeasure for TN3).
# Alert threshold: suite-level flake rate > 5% over trailing 20 runs opens a GH Issue.
# Pre-mortem #1 guard: flakes accrete silently without this job.
name: flake-monitor

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  flake-monitor:
    runs-on: ubuntu-24.04
    name: compute e2e flake rate (trailing 20 runs)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: download recent playwright-report artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p flake-data
          # Download up to 20 recent playwright-report artifacts from main branch runs
          gh run list --branch main --workflow ci.yml --status success --limit 20 \
            --json databaseId --jq '.[].databaseId' > run-ids.txt

          while IFS= read -r run_id; do
            mkdir -p "flake-data/${run_id}"
            gh run download "${run_id}" \
              --name playwright-report \
              --dir "flake-data/${run_id}" 2>/dev/null || true
          done < run-ids.txt

      - name: compute flake rate
        id: flake
        env:
          FLAKE_DATA_DIR: flake-data
        run: node scripts/compute-flake-rate.js

      - name: open flake-alert issue if threshold exceeded
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f flake-rate.txt ]; then exit 0; fi
          RATE=$(cat flake-rate.txt)
          # Use awk for float comparison (bash can't do floats)
          EXCEEDED=$(awk -v r="$RATE" 'BEGIN { print (r + 0 > 5.0) ? "yes" : "no" }')
          if [ "$EXCEEDED" = "yes" ]; then
            echo "Flake rate ${RATE}% exceeds 5% threshold — opening GH Issue"
            gh issue create \
              --title "E2E Flake Alert: suite flake rate ${RATE}% exceeds 5% threshold" \
              --body "The trailing e2e flake rate is **${RATE}%**, which exceeds the 5% threshold (B3, O6).

          This means retries are masking real regressions. Investigate and fix flaky specs before the release gate loses integrity (pre-mortem #1 scenario).

          See the [flake-monitor workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for per-spec breakdown." \
              --label "flake-alert" || true
          fi
