# Satisfies: RT-11 (native GHA runner matrix per platform),
#            RT-5 (uses pinned tools via go.mod tool directive),
#            RT-13-adjacent (branches/PRs; release.yml handles tags),
#            T5 (make test stays under 30s per platform).
#
# Trigger: every push to main + every PR. We run the real test + lint on
# all four target platforms so a regression on one architecture doesn't
# slip through via an amd64-only merge check.

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # RT-11: explicitly pinned runner labels. Do NOT use `*-latest` —
        # drift would break the platform smoke guarantee (TN6).
        # macos-13 (Intel) was retired by GitHub in 2025; macos-15-intel is the successor.
        include:
          - os: ubuntu-24.04
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-15-intel
            platform: darwin-amd64
          - os: macos-14
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.platform }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Single source of truth — avoids drift from go.mod.
          go-version-file: go.mod
          cache: true

      - name: gofmt
        # T6 also covers gofmt. Fail if any Go file outside frontend/ is
        # unformatted. Review response M3.
        run: |
          UNFMT="$(gofmt -l . | grep -v '^frontend/' || true)"
          if [ -n "$UNFMT" ]; then
            echo "::error::gofmt violations:"
            echo "$UNFMT"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck (pinned via go.mod tool directive, RT-5)
        run: go tool staticcheck ./...

      - name: go test
        # -race catches concurrency issues that collab-wiki's CRDT and
        # audit drainer introduced. Timeout is generous relative to T5
        # so flaky runners fail loudly rather than hang.
        run: go test -race -timeout=120s ./...

  # Satisfies: RT-1 ⚡ BINDING — build prod binary once, shared across all e2e shards.
  # Without this, 3 shards × 90s rebuild = 4.5 min before a single assertion; O2 impossible.
  build-binary:
    runs-on: ubuntu-24.04
    name: build-binary (e2e prod binary)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: build frontend
        run: cd frontend && npm ci && npm run build
      - name: bundle-size gate
        # O2 / RT-13 / TN8 — fail loud on >30 KB gzipped delta over baseline.
        # Update baseline intentionally with: UPDATE_BASELINE=1 scripts/check-bundle-size.sh
        run: bash scripts/check-bundle-size.sh
      - name: decoration-rebuild perf bench
        # T2 statistical budget: p95 < 16ms tree-walk for a 5KB fixture.
        # Closes m5-verify gap G3.
        run: node scripts/bench-decorations.mjs
      - name: stage webfs/dist
        run: |
          rm -rf internal/webfs/dist
          mkdir -p internal/webfs/dist
          cp -R frontend/dist/. internal/webfs/dist/
      - name: build production binary (-tags=prod)
        run: |
          go build -trimpath -tags=prod \
            -ldflags="-s -w -X main.version=e2e-dev -X main.commit=$(git rev-parse HEAD) -X main.buildTime=$(git log -1 --format=%cI)" \
            -o phronesis ./cmd/phronesis
      - name: upload phronesis binary
        uses: actions/upload-artifact@v4
        with:
          name: phronesis-binary
          path: phronesis
          retention-days: 1

  # Satisfies: RT-2 (3-shard matrix), O1 (parallel to test job), O2 (≤5min p95),
  #            O3 (retries=2), O4 (trace+screenshot+video), T2 (Chromium only).
  e2e:
    needs: [build-binary]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # shard_index = shard - 1; explicit to avoid GHA arithmetic expression issues.
        include:
          - shard: 1
            shard_index: 0
          - shard: 2
            shard_index: 1
          - shard: 3
            shard_index: 2
    name: e2e (shard ${{ matrix.shard }}/3)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: install npm dependencies
        run: cd frontend && npm ci
      - name: install Playwright Chromium (T2 — Chromium only)
        run: cd frontend && npx playwright install --with-deps chromium
      - name: download phronesis binary (RT-1 / TN2 build-once)
        uses: actions/download-artifact@v4
        with:
          name: phronesis-binary
      - name: make binary executable
        run: chmod +x phronesis
      - name: run e2e shard ${{ matrix.shard }}/3
        run: cd frontend && npx playwright test --shard=${{ matrix.shard }}/3
        env:
          SHARD_INDEX: ${{ matrix.shard_index }}
          PHRONESIS_BIN: ${{ github.workspace }}/phronesis
          CI: 'true'
      - name: upload blob report (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7

  # Satisfies: RT-7 (unified failure artifacts), O4 (single downloadable HTML report).
  e2e-report:
    needs: [e2e]
    runs-on: ubuntu-24.04
    if: always()
    name: e2e-report (merge shard reports)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: install npm dependencies
        run: cd frontend && npm ci
      - name: download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: merge shard reports
        # Playwright 1.50's merge-reports drops --output; --reporter html,json
        # spawns fresh reporter instances whose default output paths resolve
        # under configDir (frontend/), not repo root. PLAYWRIGHT_HTML_OUTPUT_DIR
        # and PLAYWRIGHT_JSON_OUTPUT_FILE pin them to repo-root paths so the
        # upload step's `path: playwright-report/` finds the merged report.
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: ${{ github.workspace }}/playwright-report
          PLAYWRIGHT_JSON_OUTPUT_FILE: ${{ github.workspace }}/test-results/results.json
        run: cd frontend && npx playwright merge-reports -c playwright.config.ts --reporter html,json ../all-blob-reports
      - name: upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
